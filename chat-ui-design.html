<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English App — Chat UI Design · 角色剧场 v3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,600;0,8..60,700;1,8..60,600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font-ui: 'Plus Jakarta Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      --font-serif: 'Source Serif 4', 'Songti SC', Georgia, serif;
      --radius-sm: 10px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --radius-xl: 24px;
      --ease-out: cubic-bezier(.22, 1, .36, 1);
    }

    body {
      font-family: var(--font-ui);
      color: #1c1917;
      min-height: 100vh;
      background:
        radial-gradient(ellipse 80% 60% at 10% 0%, rgba(199,210,254,.45), transparent 55%),
        radial-gradient(ellipse 70% 50% at 90% 10%, rgba(254,205,211,.35), transparent 50%),
        radial-gradient(ellipse 60% 40% at 50% 100%, rgba(207,250,254,.4), transparent 55%),
        #e8eaef;
    }

    /* ── Preview nav ── */
    .preview-bar {
      position: sticky; top: 0; z-index: 300;
      background: rgba(28,25,23,.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,.06);
      padding: 12px 24px 14px;
    }
    .preview-bar-top {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 10px;
    }
    .preview-bar h1 { font-size: 13px; font-weight: 700; color: #fafaf9; letter-spacing: .01em; }
    .preview-bar .tag {
      font-size: 10px; padding: 3px 9px; border-radius: 999px;
      background: linear-gradient(135deg, rgba(99,102,241,.25), rgba(168,85,247,.2));
      color: #c4b5fd; font-weight: 600; border: 1px solid rgba(167,139,250,.2);
    }
    .preview-bar .hint { font-size: 11px; color: #78716c; margin-left: auto; }
    .tab-groups { display: flex; flex-wrap: wrap; gap: 14px 20px; }
    .tab-group { display: flex; flex-wrap: wrap; align-items: center; gap: 5px; }
    .tab-group-label {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: #57534e; margin-right: 2px;
    }
    .tab-btn {
      padding: 5px 11px; border-radius: 8px; border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.04); color: #a8a29e; font-size: 11px; font-weight: 500;
      cursor: pointer; transition: all .2s var(--ease-out); font-family: inherit;
    }
    .tab-btn:hover { background: rgba(255,255,255,.1); color: #e7e5e4; }
    .tab-btn.active {
      background: #fafaf9; color: #1c1917; border-color: #fafaf9;
      font-weight: 600; box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }
    .panel { display: none; padding: 28px 24px 40px; animation: panelIn .35s var(--ease-out); }
    .panel.active { display: block; }
    @keyframes panelIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    /* ── App frame ── */
    .app-frame {
      width: 1200px; margin: 0 auto;
      border-radius: var(--radius-xl);
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(0,0,0,.04),
        0 2px 4px rgba(0,0,0,.02),
        0 12px 40px rgba(0,0,0,.08),
        0 40px 80px rgba(0,0,0,.04);
    }

    /* 对齐真实 App Header：sticky 白底 + blue-200 active */
    .app-header {
      height: 80px; background: #fff;
      border-bottom: 1px solid #e5e7eb;
      display: grid; grid-template-columns: 220px 1fr auto;
      align-items: center; padding: 0 20px;
    }
    .header-brand { display: flex; align-items: center; gap: 12px; }
    .logo-mark {
      width: 40px; height: 40px; background: #4338ca;
      color: #fff; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 18px; flex-shrink: 0;
    }
    .logo-title { font-weight: 700; font-size: 18px; color: #1c1917; letter-spacing: -.02em; }
    .nav { display: flex; align-items: center; justify-content: center; gap: 4px; }
    .nav-item {
      display: flex; align-items: center; gap: 6px; padding: 6px 10px;
      border-radius: 10px; font-size: 14px; font-weight: 500; color: #6b7280;
      transition: background .15s, color .15s;
    }
    .nav-item:hover { background: #dbeafe; color: #1d4ed8; }
    .nav-item.active { background: #dbeafe; color: #1d4ed8; font-weight: 600; }
    .nav-item svg { width: 16px; height: 16px; opacity: .85; }
    .header-stats { display: flex; align-items: center; gap: 8px; }
    .badge {
      display: flex; align-items: center; gap: 5px; padding: 5px 11px;
      border-radius: 999px; font-size: 12px; font-weight: 700;
    }
    .badge-sun { background: linear-gradient(135deg,#dbeafe,#bfdbfe); color: #1d4ed8; }
    .badge-star { background: linear-gradient(135deg,#fef3c7,#fde68a); color: #b45309; }
    .user-chip {
      display: flex; align-items: center; gap: 9px;
      padding-left: 14px; margin-left: 4px;
      border-left: 1px solid #e7e5e4;
    }
    .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600; flex-shrink: 0;
    }
    .avatar-user {
      background: linear-gradient(145deg, #f5f5f4, #e7e5e4);
      color: #57534e;
      box-shadow: 0 0 0 2px #fff, 0 0 0 3px #e7e5e4;
    }

    /* ── Chat shell ── */
    .chat-shell {
      height: calc(100vh - 168px); min-height: 640px; max-height: 800px;
      display: flex; background: #fff;
    }

    .accent-normal   { --accent:#6366f1; --accent-dark:#4f46e5; --accent-light:#818cf8; --accent-soft:#eef2ff; --accent-border:#c7d2fe; --accent-text:#4338ca; --bubble-shadow:rgba(99,102,241,.28); --icon-bg:linear-gradient(145deg,#eef2ff 0%,#e0e7ff 100%); --role-active-bg:rgba(238,242,255,.85); --glow:rgba(99,102,241,.12); }
    .accent-master   { --accent:#7c3aed; --accent-dark:#6d28d9; --accent-light:#a78bfa; --accent-soft:#f5f3ff; --accent-border:#ddd6fe; --accent-text:#6d28d9; --bubble-shadow:rgba(124,58,237,.28); --icon-bg:linear-gradient(145deg,#f5f3ff 0%,#ede9fe 100%); --role-active-bg:rgba(245,243,255,.9); --glow:rgba(124,58,237,.12); }
    .accent-business { --accent:#2563eb; --accent-dark:#1d4ed8; --accent-light:#60a5fa; --accent-soft:#eff6ff; --accent-border:#bfdbfe; --accent-text:#1d4ed8; --bubble-shadow:rgba(37,99,235,.28); --icon-bg:linear-gradient(145deg,#eff6ff 0%,#dbeafe 100%); --role-active-bg:rgba(239,246,255,.9); --glow:rgba(37,99,235,.12); }
    .accent-qilinge  { --accent:#e11d48; --accent-dark:#be123c; --accent-light:#fb7185; --accent-soft:#fff1f2; --accent-border:#fecdd3; --accent-text:#be123c; --bubble-shadow:rgba(225,29,72,.28); --icon-bg:linear-gradient(145deg,#fff1f2 0%,#ffe4e6 100%); --role-active-bg:rgba(255,241,242,.9); --glow:rgba(225,29,72,.1); }
    .accent-xiaoman  { --accent:#0891b2; --accent-dark:#0e7490; --accent-light:#22d3ee; --accent-soft:#ecfeff; --accent-border:#a5f3fc; --accent-text:#0e7490; --bubble-shadow:rgba(8,145,178,.28); --icon-bg:linear-gradient(145deg,#ecfeff 0%,#cffafe 100%); --role-active-bg:rgba(236,254,255,.9); --glow:rgba(8,145,178,.12); }

    /* ── Role sidebar ── */
    .role-sidebar {
      width: 208px; flex-shrink: 0;
      background: linear-gradient(180deg, #fafaff 0%, #f5f4ff 100%);
      border-right: 1px solid rgba(0,0,0,.05);
      display: flex; flex-direction: column;
    }
    .sidebar-title {
      padding: 22px 18px 12px; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .12em; color: #a8a29e;
    }
    .role-item {
      display: flex; align-items: center; gap: 11px;
      margin: 0 12px 3px; padding: 10px 10px; border-radius: var(--radius-md);
      border: 1px solid transparent;
      transition: all .22s var(--ease-out); cursor: default;
    }
    .role-item:hover {
      background: rgba(255,255,255,.7);
      border-color: rgba(0,0,0,.04);
    }
    .role-item.active {
      background: var(--role-active-bg);
      border-color: var(--accent-border);
      box-shadow: 0 2px 12px var(--glow), inset 3px 0 0 var(--accent);
    }
    .role-icon-box {
      width: 38px; height: 38px; border-radius: 13px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 18px;
      background: var(--icon-bg);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.8), 0 1px 3px rgba(0,0,0,.06);
      border: 1px solid rgba(255,255,255,.6);
    }
    .role-item.active .role-icon-box {
      box-shadow: inset 0 1px 0 rgba(255,255,255,.9), 0 4px 12px var(--glow);
    }
    .role-name { font-size: 13px; font-weight: 600; color: #292524; line-height: 1.35; }
    .role-desc { font-size: 10.5px; color: #a8a29e; margin-top: 2px; line-height: 1.3; }

    /* ── Conv sidebar ── */
    .conv-sidebar {
      width: 268px; flex-shrink: 0;
      background: #fefefe;
      border-right: 1px solid rgba(0,0,0,.05);
      display: flex; flex-direction: column;
    }
    .conv-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 16px 14px;
    }
    .conv-header span { font-size: 12px; font-weight: 700; color: #78716c; letter-spacing: .02em; }
    .btn-new {
      width: 30px; height: 30px; border-radius: 10px; border: none;
      background: linear-gradient(145deg, var(--accent), var(--accent-dark));
      color: #fff; font-size: 20px; line-height: 1; font-weight: 300;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 10px var(--bubble-shadow);
      transition: transform .2s var(--ease-out);
    }
    .btn-new:hover { transform: scale(1.06); }
    .conv-item {
      margin: 0 10px 3px; padding: 11px 13px; border-radius: var(--radius-sm);
      font-size: 13px; color: #44403c; border: 1px solid transparent;
      display: flex; align-items: center; gap: 9px;
      transition: all .18s var(--ease-out);
    }
    .conv-item:hover { background: #fafaf9; border-color: #f5f5f4; }
    .conv-item::before {
      content: ''; width: 7px; height: 7px; border-radius: 50%;
      background: transparent; flex-shrink: 0; transition: background .18s;
    }
    .conv-item.active {
      background: var(--accent-soft);
      border-color: color-mix(in srgb, var(--accent) 20%, transparent);
      color: var(--accent-text); font-weight: 600;
      box-shadow: 0 1px 4px var(--glow);
    }
    .conv-item.active::before {
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
    }
    .conv-item .conv-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .conv-item .btn-del {
      opacity: 0; width: 24px; height: 24px; border-radius: 7px; border: none;
      background: #fef2f2; color: #dc2626; font-size: 11px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: opacity .15s;
    }
    .conv-item.show-delete .btn-del { opacity: 1; }
    .conv-empty {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 10px; padding: 32px 20px; text-align: center;
    }
    .conv-empty-icon {
      width: 52px; height: 52px; border-radius: 16px;
      background: linear-gradient(145deg, #f5f5f4, #e7e5e4);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; margin-bottom: 4px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.8);
    }
    .conv-empty div { color: #78716c; font-size: 13px; font-weight: 500; }
    .conv-empty small { font-size: 11px; color: #d6d3d1; }

    /* ── Chat main ── */
    .chat-main {
      flex: 1; display: flex; flex-direction: column;
      background: #faf9f6; min-width: 0; position: relative; overflow: hidden;
    }
    .chat-main::before {
      content: ''; position: absolute; top: -120px; right: -80px;
      width: 360px; height: 360px; border-radius: 50%;
      background: radial-gradient(circle, var(--glow) 0%, transparent 70%);
      pointer-events: none;
    }
    .chat-main::after {
      content: ''; position: absolute; inset: 0; pointer-events: none; opacity: .025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    .chat-topbar {
      padding: 16px 28px; border-bottom: 1px solid rgba(0,0,0,.04);
      background: rgba(255,255,255,.75); backdrop-filter: blur(8px);
      display: flex; align-items: center; gap: 12px;
      position: relative; z-index: 2;
    }
    .chat-topbar h2 {
      font-size: 15px; font-weight: 700; color: #1c1917; letter-spacing: -.01em;
      flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .role-chip {
      font-size: 11px; padding: 5px 12px; border-radius: 999px; flex-shrink: 0;
      background: var(--accent-soft); color: var(--accent-text);
      border: 1px solid color-mix(in srgb, var(--accent) 18%, transparent);
      font-weight: 600; letter-spacing: .01em;
    }

    .chat-scroll {
      flex: 1; overflow-y: auto; padding: 24px 0; position: relative; z-index: 1;
      scrollbar-width: thin; scrollbar-color: #d6d3d1 transparent;
    }
    .chat-scroll::-webkit-scrollbar { width: 5px; }
    .chat-scroll::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 99px; }
    .chat-column { max-width: 720px; margin: 0 auto; padding: 0 28px; }

    /* Welcome */
    .welcome {
      text-align: center; padding: 36px 0 20px; position: relative;
    }
    .welcome-orb {
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 280px; height: 140px;
      background: radial-gradient(ellipse, var(--glow) 0%, transparent 70%);
      pointer-events: none; filter: blur(20px);
    }
    .welcome-greeting {
      font-family: var(--font-serif); font-size: 36px; font-weight: 700;
      letter-spacing: -.025em; line-height: 1.2; margin-bottom: 10px;
      background: linear-gradient(135deg, #1c1917 30%, var(--accent) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; position: relative;
    }
    .welcome-sub {
      font-size: 15px; color: #78716c; margin-bottom: 12px;
      max-width: 420px; margin-left: auto; margin-right: auto; line-height: 1.6;
    }
    .welcome-hint {
      font-size: 12px; color: #a8a29e; margin-bottom: 36px;
    }
    .welcome-cards { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; align-items: stretch; }
    .welcome-card {
      width: 200px; padding: 22px 20px 20px;
      background: rgba(255,255,255,.85);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.9);
      border-radius: 18px; text-align: left; position: relative; overflow: hidden;
      box-shadow: 0 1px 2px rgba(0,0,0,.04), 0 4px 16px rgba(0,0,0,.03);
      transition: transform .28s var(--ease-out), box-shadow .28s var(--ease-out), border-color .28s;
      animation: cardUp .5s var(--ease-out) both;
    }
    .welcome-card:nth-child(1) { animation-delay: .05s; }
    .welcome-card:nth-child(2) { animation-delay: .12s; }
    .welcome-card:nth-child(3) { animation-delay: .19s; }
    @keyframes cardUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
    .welcome-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 30px var(--glow), 0 2px 8px rgba(0,0,0,.04);
      border-color: color-mix(in srgb, var(--accent) 25%, #fff);
    }
    .welcome-card-icon {
      width: 46px; height: 46px; border-radius: 15px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; margin-bottom: 16px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.7), 0 2px 8px rgba(0,0,0,.05);
      transition: transform .28s var(--ease-out);
    }
    .welcome-card:hover .welcome-card-icon { transform: scale(1.06) rotate(-2deg); }
    .welcome-card h3 { font-size: 14px; font-weight: 700; color: #1c1917; margin-bottom: 5px; letter-spacing: -.01em; }
    .welcome-card p { font-size: 12px; color: #78716c; line-height: 1.55; }
    .welcome-card-bar {
      position: absolute; bottom: 0; left: 16px; right: 16px; height: 2px;
      border-radius: 99px; opacity: 0; transition: opacity .28s;
      background: linear-gradient(90deg, var(--accent-light), var(--accent));
    }
    .welcome-card:hover .welcome-card-bar { opacity: 1; }
    .welcome-card.featured {
      width: 228px; border-color: color-mix(in srgb, var(--accent) 22%, #fff);
      box-shadow: 0 4px 20px var(--glow);
    }
    .welcome-card .card-badge {
      position: absolute; top: 14px; right: 14px;
      font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 999px;
      background: var(--accent-soft); color: var(--accent-text);
      border: 1px solid var(--accent-border);
    }

    .c-purple .welcome-card-icon { background: linear-gradient(145deg,#eef2ff,#e0e7ff); }
    .c-blue   .welcome-card-icon { background: linear-gradient(145deg,#eff6ff,#dbeafe); }
    .c-green  .welcome-card-icon { background: linear-gradient(145deg,#f0fdf4,#dcfce7); }
    .c-pink   .welcome-card-icon { background: linear-gradient(145deg,#fdf2f8,#fce7f3); }
    .c-rose   .welcome-card-icon { background: linear-gradient(145deg,#fff1f2,#ffe4e6); }
    .c-amber  .welcome-card-icon { background: linear-gradient(145deg,#fffbeb,#fef3c7); }
    .c-cyan   .welcome-card-icon { background: linear-gradient(145deg,#ecfeff,#cffafe); }
    .c-teal   .welcome-card-icon { background: linear-gradient(145deg,#f0fdfa,#ccfbf1); }
    .c-orange .welcome-card-icon { background: linear-gradient(145deg,#fff7ed,#ffedd5); }

    /* Messages */
    .msg-row { display: flex; gap: 14px; margin-bottom: 28px; animation: msgIn .4s var(--ease-out) both; }
    .msg-row.user { flex-direction: row-reverse; align-items: flex-end; }
    .msg-row.ai { align-items: flex-start; }
    @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    .bubble-user {
      max-width: min(72%, 480px);
      background: linear-gradient(145deg, var(--accent-light) 0%, var(--accent) 50%, var(--accent-dark) 100%);
      color: #fff; padding: 12px 18px;
      border-radius: 20px 20px 6px 20px;
      font-size: 14px; line-height: 1.6; font-weight: 450;
      box-shadow: 0 4px 16px var(--bubble-shadow), inset 0 1px 0 rgba(255,255,255,.15);
    }

    .avatar-ai {
      background: var(--icon-bg); font-size: 17px;
      border: 2px solid #fff;
      box-shadow: 0 0 0 1px var(--accent-border), 0 4px 12px var(--glow);
    }

    .ai-card {
      flex: 1; min-width: 0;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(0,0,0,.06);
      border-radius: 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.03);
      overflow: hidden; position: relative;
    }
    .ai-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--accent-light), var(--accent), var(--accent-dark));
    }
    .ai-card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 18px 10px; border-bottom: 1px solid rgba(0,0,0,.04);
    }
    .ai-card-header .name {
      font-size: 12px; font-weight: 700; color: #44403c;
      display: flex; align-items: center; gap: 6px;
    }
    .ai-card-header .name::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 6px var(--accent);
    }
    .ai-card-header .time { font-size: 11px; color: #a8a29e; font-weight: 500; }
    .ai-card-body { padding: 16px 18px 18px; font-size: 13.5px; color: #44403c; line-height: 1.7; }

    .reasoning-bar {
      margin: 0 16px; padding: 9px 13px;
      background: linear-gradient(135deg, #fafaf9, #f5f5f4);
      border: 1px solid #e7e5e4; border-radius: var(--radius-sm);
      font-size: 11px; color: #78716c; font-weight: 500;
      display: flex; align-items: center; gap: 7px;
    }
    .reasoning-expanded {
      margin: 8px 16px 0; padding: 12px 14px;
      background: #fafaf9; border-radius: var(--radius-sm);
      font-size: 11.5px; color: #57534e; line-height: 1.65;

    }

    .tool-pill {
      display: inline-flex; align-items: center; gap: 7px;
      margin: 12px 16px 0; padding: 7px 13px;
      background: linear-gradient(135deg, #f0fdf4, #dcfce7);
      border: 1px solid #86efac; border-radius: 999px;
      font-size: 11px; color: #15803d; font-weight: 600;

      background: linear-gradient(135deg, #fffbeb, #fef3c7);
      border-color: #fcd34d; color: #b45309;
    }
    .tool-detail {
      margin: 8px 16px 0; padding: 11px 14px;
      background: #fafaf9; border-radius: var(--radius-sm);
      font-size: 11px; color: #57534e;
      border: 1px solid #f0eeec; line-height: 1.65;
      font-family: 'Consolas', monospace;
    }

    .typing { display: flex; gap: 5px; padding: 6px 0; }

      width: 7px; height: 7px; border-radius: 50%; background: var(--accent);
      animation: bounce 1.4s infinite ease-in-out both;
    }
    .typing span:nth-child(1) { animation-delay: -.32s; }
    .typing span:nth-child(2) { animation-delay: -.16s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: .35; }
      40% { transform: translateY(-5px); opacity: 1; }
    }

    .md h3 {
      font-family: var(--font-serif); font-size: 1.12em; font-weight: 700;
      color: #1c1917; margin: 0 0 12px; letter-spacing: -.01em;
    }
    .md h3::before {
      content: ''; display: inline-block; width: 3px; height: 16px;
      background: linear-gradient(180deg, var(--accent-light), var(--accent));
      border-radius: 99px; margin-right: 9px; vertical-align: -3px;
    }
    .md table {
      width: 100%; border-collapse: separate; border-spacing: 0;
      margin: 12px 0; border: 1px solid #e7e5e4; border-radius: 12px;
      overflow: hidden; font-size: 12.5px;
      box-shadow: 0 1px 3px rgba(0,0,0,.03);
    }
    .md thead { background: var(--accent-soft); }
    .md th {
      padding: 10px 12px; text-align: left; font-weight: 700;

      font-size: 11px; text-transform: uppercase; letter-spacing: .04em;
    }
    .md td { padding: 9px 12px; border-bottom: 1px solid #f5f5f4; }

    .md tbody tr:nth-child(even) { background: rgba(250,250,249,.8); }
    .md ul { margin: 10px 0; padding-left: 1.3em; }
    .md li { margin: 5px 0; }
    .md li::marker { color: var(--accent); }
    .md strong { color: #1c1917; font-weight: 700; }
    .md blockquote {
      margin: 14px 0 0; padding: 12px 16px;
      background: linear-gradient(135deg, var(--accent-soft), rgba(255,255,255,.5));
      border-left: 3px solid var(--accent); border-radius: 0 12px 12px 0;
      color: #44403c; font-size: 12.5px; line-height: 1.65;
    }
    .md code {
      font-family: 'JetBrains Mono', Consolas, monospace; font-size: 11.5px;
      background: #f5f5f4; padding: 2px 6px; border-radius: 5px;
      border: 1px solid #e7e5e4; color: #be123c;
    }
    .md pre {
      background: linear-gradient(145deg, #1e1e2e, #181825);
      color: #cdd6f4; padding: 14px 16px;
      border-radius: 12px; overflow-x: auto; font-size: 11.5px; margin: 12px 0;
      border: 1px solid rgba(255,255,255,.06);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
    }

    .stream-text { white-space: pre-wrap; word-break: break-word; color: #57534e; font-size: 13.5px; line-height: 1.7; }
    .stream-cursor {
      display: inline-block; width: 2px; height: 15px;
      background: var(--accent); margin-left: 1px; vertical-align: -2px;
      animation: blink .7s step-end infinite; border-radius: 1px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .error-box {
      padding: 14px 16px; background: linear-gradient(135deg, #fef2f2, #fff1f2);
      border: 1px solid #fecaca; border-radius: 12px;
      color: #b91c1c; font-size: 13px; line-height: 1.5;
    }
    .btn-retry {
      margin-top: 12px; padding: 6px 16px; border-radius: 9px;
      border: 1px solid #fca5a5; background: #fff; color: #dc2626;
      font-size: 12px; font-weight: 600; font-family: inherit;
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
    }

    /* Input dock — floating style */
    .input-dock {
      padding: 16px 28px 20px;
      background: linear-gradient(180deg, transparent, rgba(255,255,255,.5));
      position: relative; z-index: 2;
    }
    .input-dock-inner { max-width: 720px; margin: 0 auto; }
    .toggle-row { display: flex; gap: 7px; margin-bottom: 11px; }
    .toggle-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 13px; border-radius: 999px; font-size: 11.5px;
      border: 1px solid #e7e5e4; background: rgba(255,255,255,.8);
      color: #78716c; font-weight: 600; transition: all .2s var(--ease-out);
    }
    .toggle-pill.on {
      background: var(--accent-soft); border-color: color-mix(in srgb, var(--accent) 30%, transparent);
      color: var(--accent-text); box-shadow: 0 1px 4px var(--glow);
    }
    .toggle-pill.on-blue {
      background: #eff6ff; border-color: #93c5fd; color: #1d4ed8;
      box-shadow: 0 1px 4px rgba(37,99,235,.1);
    }
    .toggle-pill svg { width: 14px; height: 14px; flex-shrink: 0; opacity: .9; }

    .chat-topbar-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
    .btn-stop-gen {
      padding: 5px 12px; border-radius: 999px; border: 1px solid #fecaca;
      background: #fef2f2; color: #dc2626; font-size: 11px; font-weight: 600;
      font-family: inherit; display: flex; align-items: center; gap: 5px;
    }
    .btn-stop-gen svg { width: 12px; height: 12px; }
    .input-box {
      display: flex; align-items: flex-end; gap: 10px;
      background: #fff;
      border: 1px solid #e7e5e4;
      border-radius: 18px;
      padding: 12px 12px 12px 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.03);
      transition: border-color .2s, box-shadow .2s;
    }
    .input-box.focused {
      border-color: color-mix(in srgb, var(--accent) 40%, #e7e5e4);
      box-shadow: 0 0 0 4px var(--glow), 0 4px 16px rgba(0,0,0,.05);
    }
    .input-box.disabled { opacity: .5; pointer-events: none; filter: grayscale(.3); }
    .input-box textarea {
      flex: 1; border: none; outline: none; resize: none;
      font-family: inherit; font-size: 14px; line-height: 1.55;
      color: #1c1917; background: transparent; min-height: 46px; max-height: 120px;
    }
    .input-box textarea::placeholder { color: #a8a29e; }
    .input-actions { display: flex; gap: 7px; flex-shrink: 0; align-items: center; }
    .btn-icon {
      width: 38px; height: 38px; border-radius: 12px; border: none;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s var(--ease-out); cursor: default;
    }
    .btn-icon svg { width: 17px; height: 17px; }
    .btn-mic {
      background: #fafaf9; border: 1px solid #e7e5e4; color: #78716c;
    }
    .btn-mic.recording {
      background: #fef2f2; border-color: #fca5a5; color: #dc2626;
      animation: pulse-ring 1.5s ease infinite;
    }
    @keyframes pulse-ring {
      0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,.25); }
      50% { box-shadow: 0 0 0 8px rgba(220,38,38,0); }
    }
    .btn-send {
      background: linear-gradient(145deg, var(--accent-light), var(--accent-dark));
      color: #fff; box-shadow: 0 3px 12px var(--bubble-shadow);
    }
    .btn-send.stop { background: #a8a29e; box-shadow: none; }
    .char-count {
      text-align: right; font-size: 10.5px; color: #a8a29e;
      margin-top: 8px; font-weight: 500; letter-spacing: .02em;
    }

    /* Tokens */
    .tokens-wrap { width: 1200px; margin: 0 auto; padding: 8px 0 20px; }
    .tokens-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
    .token-card {
      background: #fff; border-radius: 18px; overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.03);
      border: 1px solid rgba(0,0,0,.04);
    }
    .token-swatch { height: 88px; position: relative; }
    .token-swatch::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,.08));
    }
    .token-info { padding: 16px; }
    .token-info h3 { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
    .token-info p { font-size: 10.5px; color: #78716c; line-height: 1.6; font-family: monospace; }
    .token-colors { display: flex; gap: 6px; margin-top: 12px; }
    .token-dot { width: 22px; height: 22px; border-radius: 7px; border: 2px solid #fff; box-shadow: 0 1px 3px rgba(0,0,0,.1); }

    .svg-icon { fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* 角色切换过渡预览 */
    .role-switch-banner {
      margin: 0 28px 12px; padding: 10px 14px; border-radius: var(--radius-sm);
      background: var(--accent-soft); border: 1px solid var(--accent-border);
      font-size: 12px; color: var(--accent-text); font-weight: 500;
      display: flex; align-items: center; gap: 8px;
      animation: panelIn .35s var(--ease-out);
    }
    .role-switch-banner svg { width: 16px; height: 16px; flex-shrink: 0; }
  </style>
</head>

<script>
const SVG_SEND = '<svg viewBox="0 0 24 24" class="svg-icon"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>';

const SVG_BRAIN = '<svg viewBox="0 0 24 24" class="svg-icon"><path d="M12 2a7 7 0 0 1 7 7c0 2.5-1.2 4.7-3 6.1V18a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2v-2.9A7 7 0 0 1 5 9a7 7 0 0 1 7-7z"/><path d="M9 18h6"/></svg>';
const SVG_GLOBE = '<svg viewBox="0 0 24 24" class="svg-icon"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>';
const SVG_HOME = '<svg viewBox="0 0 24 24" class="svg-icon"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 10v10h14V10"/></svg>';
const SVG_CHAT = '<svg viewBox="0 0 24 24" class="svg-icon"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/></svg>';
const SVG_BOOK = '<svg viewBox="0 0 24 24" class="svg-icon"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>';
const SVG_COURSE = '<svg viewBox="0 0 24 24" class="svg-icon"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v15H6.5A2.5 2.5 0 0 1 4 14.5v-12A2.5 2.5 0 0 1 6.5 0H20v2H6.5a.5.5 0 0 0-.5.5v12a.5.5 0 0 0 .5.5H20"/></svg>';
const SVG_SETTING = '<svg viewBox="0 0 24 24" class="svg-icon"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
const SVG_SWAP = '<svg viewBox="0 0 24 24" class="svg-icon"><path d="M16 3h5v5M4 21 21 4M21 16v5h-5"/></svg>';

const ROLES = [
  { id: 'normal',   label: '智能助手', accent: 'accent-normal',   icon: '🧠', desc: '查词·语法·搜索' },
  { id: 'master',   label: '英语大师', accent: 'accent-master',   icon: '🎓', desc: '专业术语，英文回复' },
  { id: 'business', label: '商务英语', accent: 'accent-business', icon: '💼', desc: '商务场景对话' },

];

const WELCOME = {
  normal:   { greeting: '你好！👋', sub: '我是你的英语学习助手，有什么可以帮你的？', cards: [['c-purple','🔍','查词释义','查询单词的含义、音标和例句'],['c-blue','✏️','语法检查','检查英语句子的语法错误并给出修正'],['c-green','🌐','联网搜索','搜索互联网获取最新的信息']] },
  master:   { greeting: 'Hello! 🎓', sub: "I'm your English master. Let's practice together.", cards: [['c-purple','📖','用英语解释','让我用英语帮你解释词义和概念'],['c-blue','🗣️','纠正我的表达','帮你改正英语表达中的错误'],['c-green','💡','举例造句','用例句帮你理解和记忆单词']] },
  business: { greeting: '你好！💼', sub: '我是商务英语专家，帮你搞定职场英语。', cards: [['c-purple','✉️','写商务邮件','帮你撰写专业的英文商务邮件'],['c-blue','🤝','模拟面试对话','模拟真实场景练习商务英语'],['c-green','📊','商务术语解释','解释商务场景中的专业术语']] },
  qilinge:  { greeting: '嘿！🤣', sub: '麒麟哥来了！准备好被我气死吧！', cards: [['c-pink','🤣','搞笑解释单词','用麒麟哥的方式帮你记住单词'],['c-rose','😤','吐槽我的语法','看看你的英语有多离谱'],['c-amber','🎭','角色扮演对话','进入剧情，用英语吵架']] },
  xiaoman:  { greeting: 'Hey! 💻', sub: '小满模式已启动，用程序员的方式学英语。', cards: [['c-cyan','💻','代码解释语法','用伪代码和逻辑帮你理解英语语法'],['c-teal','🐛','Debug 这句话','像 debug 一样帮你找出英语错误'],['c-orange','⚡','编程英语术语','学习程序员常用的英语表达']] },
};

      <div class="logo-mark">E</div>
      <div class="logo-title">English App</div>

function appFooter() { return '</div>'; }

function roleSidebar(activeId) {
  return `<aside class="role-sidebar"><div class="sidebar-title">角色</div>
    ${ROLES.map(r => `<div class="role-item${r.id === activeId ? ' active' : ''}">

function convSidebar(items, activeIdx, empty) {
  if (empty) return `<aside class="conv-sidebar">
    <div class="conv-header"><span>对话</span><button class="btn-new">+</button></div>
    <div class="conv-empty">
      <div class="conv-empty-icon">💬</div>
      <div>暂无对话</div>
      <small>点击上方 + 开始新对话</small>

  return `<aside class="conv-sidebar">
    <div class="conv-header"><span>对话</span><button class="btn-new">+</button></div>

function inputDock(opts = {}) {
  const { deep, web, placeholder = '输入消息，Enter 发送…', disabled, voice, focused, charCount = '0 / 4000', showStopHint } = opts;
  return `<div class="input-dock"><div class="input-dock-inner">

      <div class="toggle-pill${deep ? ' on' : ''}">${SVG_BRAIN}<span>深度思考</span></div>

  const w = WELCOME[roleId];
  const placeholders = { xiaoman: 'Paste your English here…', qilinge: '随便说点啥…' };
  return `<div class="chat-scroll"><div class="chat-column"><div class="welcome">

  const r = ROLES.find(x => x.id === roleId);
  const { time = '刚刚', body, reasoning, reasoningOpen, tool, toolPending, toolDetail, typing } = opts;
  return `<div class="msg-row ai">
    <div class="avatar avatar-ai">${r.icon}</div>
    <div class="ai-card">
      <div class="ai-card-header"><span class="name">${r.label}</span><span class="time">${time}</span></div>
      ${reasoning ? `<div class="reasoning-bar">💭 思考过程 ${reasoningOpen ? '▲' : '▼'}</div>` : ''}
      ${reasoningOpen ? `<div class="reasoning-expanded">${reasoning}</div>` : ''}
      ${tool ? `<div class="tool-pill${toolPending ? ' pending' : ''}">${toolPending ? '⏳' : '✅'} ${tool}</div>` : ''}
      ${toolDetail ? `<div class="tool-detail">${toolDetail}</div>` : ''}
      <div class="ai-card-body">${typing ? '<div class="typing"><span></span><span></span><span></span></div>' : ''}${body || ''}</div>
    </div>
  </div>`;
}

function shell(activeRole, convHtml, mainHtml) {
  const r = ROLES.find(x => x.id === activeRole);
  return `${appHeader()}<div class="chat-shell ${r.accent}">${roleSidebar(activeRole)}${convHtml}<main class="chat-main">${mainHtml}</main></div>${appFooter()}`;
}

const groups = [...new Set(tabs.map(t => t.group))];
const tabGroupsEl = document.getElementById('tab-groups');
groups.forEach(g => {
  const div = document.createElement('div');
  div.className = 'tab-group';
  div.innerHTML = `<span class="tab-group-label">${g}</span>`;
  tabs.filter(t => t.group === g).forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (g === groups[0] && i === 0 ? ' active' : '');
    btn.dataset.tab = t.id;
    btn.textContent = t.label;
    btn.addEventListener('click', () => switchTab(t.id));
    div.appendChild(btn);
  });
  tabGroupsEl.appendChild(div);
});

const panelsEl = document.getElementById('panels');
panels.forEach((p, i) => {
  const sec = document.createElement('section');
  sec.id = p.id;
  sec.className = 'panel' + (i === 0 ? ' active' : '');
  sec.innerHTML = p.html;
  panelsEl.appendChild(sec);
});

function switchTab(id) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === id));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === id));
}
