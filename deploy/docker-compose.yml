# 生产部署 compose — ECS 上由 GitHub Actions 同步此文件与 .env
# 本地调试：在仓库根目录执行
#   docker compose -f deploy/docker-compose.yml --env-file deploy/.env up --build

name: english

services:
  postgres:
    image: docker.m.daocloud.io/pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: english
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d english"]
      interval: 5s
      timeout: 5s
      retries: 12
    deploy:
      resources:
        limits:
          memory: 512M

  minio:
    image: docker.m.daocloud.io/minio/minio:RELEASE.2024-12-18T13-15-44Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    deploy:
      resources:
        limits:
          memory: 384M

  app:
    image: ghcr.io/${GHCR_OWNER:-kangxuanhang-ai}/english-project/server:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      RUN_MIGRATIONS: "1"
      HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    entrypoint: ["/entrypoint-app.sh"]
    command:
      - uv
      - run
      - python
      - -m
      - uvicorn
      - app.main:socket_app
      - --host
      - "0.0.0.0"
      - --port
      - "3000"
    deploy:
      resources:
        limits:
          memory: 768M

  ai:
    image: ghcr.io/${GHCR_OWNER:-kangxuanhang-ai}/english-project/server:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
    depends_on:
      postgres:
        condition: service_healthy
      app:
        condition: service_started
    entrypoint: ["/entrypoint-app.sh"]
    command:
      - uv
      - run
      - python
      - -m
      - uvicorn
      - ai.main:ai_app
      - --host
      - "0.0.0.0"
      - --port
      - "3001"
    deploy:
      resources:
        limits:
          memory: 1536M

  nginx:
    image: ghcr.io/${GHCR_OWNER:-kangxuanhang-ai}/english-project/nginx:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - app
      - ai
      - minio
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  postgres_data:
  minio_data:
