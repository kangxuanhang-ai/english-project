name: Deploy to ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PUBLIC_HOST: http://101.37.235.230

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/server/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/english-server:latest
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/english-server:${{ github.sha }}
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/english-server:${{ env.SHORT_SHA }}

      - name: Build and push nginx image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/nginx/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_MINIO_ENDPOINT=${{ env.PUBLIC_HOST }}/minio
            VITE_SOCKET_URL=
            VITE_BASE=/admin/
          tags: |
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/english-nginx:latest
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/english-nginx:${{ github.sha }}
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/english-nginx:${{ env.SHORT_SHA }}

      - name: Copy compose file to ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          source: deploy/docker-compose.yml
          target: /opt/english-project
          strip_components: 1

      - name: Deploy on ECS
        uses: appleboy/ssh-action@v1.2.0
        env:
          SERVER_ENV: ${{ secrets.SERVER_ENV }}
          ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
          ACR_NAMESPACE: ${{ secrets.ACR_NAMESPACE }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          envs: SERVER_ENV,ACR_REGISTRY,ACR_NAMESPACE,ACR_USERNAME,ACR_PASSWORD,IMAGE_TAG
          command_timeout: 60m
          script: |
            set -e
            mkdir -p /opt/english-project
            cd /opt/english-project
            printf '%s\n' "$SERVER_ENV" > .env
            for key in IMAGE_TAG ACR_REGISTRY ACR_NAMESPACE GHCR_OWNER; do
              grep -v "^${key}=" .env > .env.tmp || true
              mv .env.tmp .env
            done
            echo "IMAGE_TAG=${IMAGE_TAG}" >> .env
            echo "ACR_REGISTRY=${ACR_REGISTRY}" >> .env
            echo "ACR_NAMESPACE=${ACR_NAMESPACE}" >> .env
            echo "$ACR_PASSWORD" | docker login "$ACR_REGISTRY" -u "$ACR_USERNAME" --password-stdin
            # 仅拉取本次部署变更的应用镜像，避免每次从 Docker Hub 重拉 postgres/minio 超时
            docker compose -f docker-compose.yml pull app ai mcp nginx
            docker compose -f docker-compose.yml up -d --remove-orphans
            docker image prune -f
            echo "Deploy finished. Health: curl -s ${{ env.PUBLIC_HOST }}/health"
